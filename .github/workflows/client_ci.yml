name: Build and Push client Image
run-name: ${{ github.actor }} Building client

on: 
  push:
    branches: [main]
    # paths:
    #   - client/**

jobs:
  build-client:
    
    runs-on: ubuntu-latest
    steps: 
    - uses: actions/checkout@v4
    
    - name: Create New TAG at ENV
      run: |
        ls
        ls -la
        echo "TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USER }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        context: ./client
        push: true
        tags: ${{ secrets.DOCKER_USER }}/${{ secrets.REPO_CLIENT }}:${{ env.TAG }}

    - name: Chenge Deploy Tag
      run : |
        sed -i "s|${{ secrets.DOCKER_USER }}/${{ secrets.REPO_CLIENT }}:.*|${{ secrets.DOCKER_USER }}/${{ secrets.REPO_CLIENT }}:${{ env.TAG }}|" manifest/deployments/client-deployment.yml
      
    - name: Push Manifest File 
      run : |
        git config user.email ${{ secrets.EMAIL }}
        git config user.name "readoy-cse"
        git config --add safe.directory .
        git add .
        git commit -m "deploy tag ${{ env.TAG }}"