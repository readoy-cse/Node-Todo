---
#  Database Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-mongo
  labels:
    app: todo-mongo

spec:
  replicas: 3
  selector:
    matchLabels:
      app: todo-mongo
  
  template:
    metadata:
      labels:
        app: todo-mongo
    
    spec:
      containers:
      - name: mongo
        image: mongo:latest
        ports:
        - containerPort: 27017
