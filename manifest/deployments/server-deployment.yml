---
# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-backend
  labels:
    app: todo-backend

spec:
  replicas: 3
  selector:
    matchLabels:
      app: todo-backend
  
  template:
    metadata:
      labels:
        app: todo-backend
    
    spec:
      containers:
      - name: todo-server
        image:   sakibtalukqder/todo-server-prod:d2991b7
        ports:
        - containerPort: 5000
        env:
        - name: MONGODB_URI
          value: "mongodb://todo-svc-mongo:27017/node_todo"
        - name: PORT
          value: "5000"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
