---
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-frontend
  labels:
    app: todo-frontend

spec:
  replicas: 2
  selector:
    matchLabels:
      app: todo-frontend
  
  template:
    metadata:
      labels:
        app: todo-frontend
    
    spec:
      containers:
      - name: todo-client
        image: sakibtalukqder/todo-client-prod:latest
        ports:
        - containerPort: 80

---
# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-backend
  labels:
    app: todo-backend

spec:
  replicas: 2
  selector:
    matchLabels:
      app: todo-backend
  
  template:
    metadata:
      labels:
        app: todo-backend
    
    spec:
      containers:
      - name: todo-server
        image: sakibtalukqder/todo-server-prod:latest
        ports:
        - containerPort: 5000
        env:
        - name: MONGODB_URI
          value: "mongodb://todo-svc-mongo:27017/node_todo"
        - name: PORT
          value: "5000"

---
#  Database Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-mongo
  labels:
    app: todo-mongo

spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-mongo
  
  template:
    metadata:
      labels:
        app: todo-mongo
    
    spec:
      containers:
      - name: mongo
        image: mongo:latest
        ports:
        - containerPort: 27017