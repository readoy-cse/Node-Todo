---
# Frontend Services (NodePort)
apiVersion: v1
kind: Service
metadata:
  name: todo-svc-frontend
  labels:
    app: todo-frontend

spec:
  type: NodePort
  selector:
    app: todo-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080

---
# Backend Services (ClusterIP)
apiVersion: v1
kind: Service
metadata:
  name: todo-svc-backend

spec:
  type: ClusterIP
  selector:
    app: todo-backend
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000

---
# MongoDB Services (ClusterIP)
apiVersion: v1
kind: Service
metadata:
  name: todo-svc-mongo

spec:
  type: ClusterIP
  selector:
    app: todo-mongo
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017 
      