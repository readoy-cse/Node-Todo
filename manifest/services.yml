apiVersion: v1
kind: Service
metadata:
  name: todo-backend-service
  labels:
    app: todo-app
  
spec:
  selector:
    app: todo-app
  type: NodePort
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
      nodePort: 30050

---
apiVersion: v1
kind: Service
metadata:
  name: todo-frontend-service
  labels:
    app: todo-app
  
spec:
  selector:
    app: todo-app
  type: NodePort
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080

---
apiVersion: v1
kind: Service
metadata:
  name: todo-db-service
  labels:
    app: todo-app
  
spec:
  selector:
    app: todo-app
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017
