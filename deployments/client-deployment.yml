---
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-frontend
  labels:
    app: todo-frontend

spec:
  replicas: 2
  selector:
    matchLabels:
      app: todo-frontend
  
  template:
    metadata:
      labels:
        app: todo-frontend
    
    spec:
      containers:
      - name: todo-client
        image: sakibtalukqder/todo-client-prod:a0124b6
        ports:
        - containerPort: 80
        env:
        - name: VITE_API_URL
          value: "http://todo-svc-backend:5000/api"

        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name

        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
              
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
